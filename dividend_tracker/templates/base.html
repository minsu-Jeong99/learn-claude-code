{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dividend Tracker{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <nav>
    <a href="{% url 'dashboard' %}" class="brand">&#9675; Dividend Tracker</a>
    <a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
    <a href="{% url 'ticker_list' %}" {% if 'ticker' in request.resolver_match.url_name %}class="active"{% endif %}>Tickers</a>
    <a href="{% url 'position_list' %}" {% if 'position' in request.resolver_match.url_name %}class="active"{% endif %}>Positions</a>
    <a href="{% url 'dividend_list' %}" {% if 'dividend' in request.resolver_match.url_name %}class="active"{% endif %}>Dividends</a>
    <a href="{% url 'projection' %}" {% if request.resolver_match.url_name == 'projection' %}class="active"{% endif %}>Projections</a>
  </nav>

  <div class="container">
    {% if messages %}
    <div class="messages">
      {% for message in messages %}
      <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
